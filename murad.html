<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Murad's Discovery Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #1a202c;
            overflow: hidden; /* Prevent scrolling */
            touch-action: none; /* Prevent pinch-zoom and scroll on mobile */
        }
        
        h1, h2, h3, .brand-font {
            font-family: 'Fredoka One', cursive;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Fun animations for UI */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.8); }
        }
        .btn-glow {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen m-0 relative select-none">

    <!-- The Game Canvas -->
    <canvas id="gameCanvas" width="800" height="400" class="bg-blue-300 shadow-2xl rounded-lg"></canvas>

    <!-- UI Overlay: Main Menu -->
    <div id="menuScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-10 transition-opacity duration-300">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-lg w-[90%] border-4 border-blue-400">
            <h1 class="text-4xl md:text-5xl text-blue-600 mb-2 brand-font tracking-wide drop-shadow-md animate-bounce-slow">Discovery Dash!</h1>
            <p class="text-gray-600 mb-6 font-bold text-lg">Run, jump, and solve puzzles!</p>
            
            <h3 class="text-xl text-gray-800 mb-4 brand-font">Select Your Hero:</h3>
            <div class="flex justify-center gap-4 mb-8">
                <!-- Murad -->
                <button onclick="selectCharacter('Murad')" class="flex flex-col items-center p-3 rounded-xl border-4 border-transparent hover:border-blue-500 hover:bg-blue-50 transition-all group">
                    <div class="text-5xl group-hover:scale-110 transition-transform">🏃‍♂️</div>
                    <span class="mt-2 font-bold text-blue-600">Murad</span>
                    <span class="text-xs text-gray-500">Explorer</span>
                </button>
                <!-- Sanan -->
                <button onclick="selectCharacter('Sanan')" class="flex flex-col items-center p-3 rounded-xl border-4 border-transparent hover:border-green-500 hover:bg-green-50 transition-all group">
                    <div class="text-5xl group-hover:scale-110 transition-transform">🛹</div>
                    <span class="mt-2 font-bold text-green-600">Sanan</span>
                    <span class="text-xs text-gray-500">Gadgets</span>
                </button>
                <!-- Leyla -->
                <button onclick="selectCharacter('Leyla')" class="flex flex-col items-center p-3 rounded-xl border-4 border-transparent hover:border-purple-500 hover:bg-purple-50 transition-all group">
                    <div class="text-5xl group-hover:scale-110 transition-transform">🧚‍♀️</div>
                    <span class="mt-2 font-bold text-purple-600">Leyla</span>
                    <span class="text-xs text-gray-500">Magic</span>
                </button>
            </div>

            <p class="text-sm text-gray-500 mb-6 bg-gray-100 p-3 rounded-lg border border-gray-200">
                <strong>How to play:</strong> Tap the screen or press SPACE to jump. Avoid the Glitch monsters (👾) and jump into the correct math answers to score big!
            </p>
        </div>
    </div>

    <!-- UI Overlay: Game HUD -->
    <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none hidden z-10 max-w-[800px] mx-auto right-0">
        <div class="bg-white/90 px-4 py-2 rounded-xl shadow-lg border-2 border-yellow-400">
            <span class="text-2xl font-bold text-gray-800 brand-font">Score: <span id="scoreDisplay" class="text-yellow-500 text-3xl">0</span></span>
        </div>
        
        <div id="questionBox" class="bg-blue-500/90 text-white px-6 py-3 rounded-2xl shadow-xl border-4 border-white transform transition-transform scale-0 opacity-0">
            <span class="text-3xl font-bold brand-font" id="mathQuestion">5 + 4 = ?</span>
        </div>

        <div class="bg-white/90 px-4 py-2 rounded-xl shadow-lg border-2 border-red-400 flex gap-1">
            <span id="life1" class="text-2xl text-red-500">❤️</span>
            <span id="life2" class="text-2xl text-red-500">❤️</span>
            <span id="life3" class="text-2xl text-red-500">❤️</span>
        </div>
    </div>

    <!-- UI Overlay: Game Over -->
    <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 backdrop-blur-sm z-20 hidden">
        <div class="bg-white p-10 rounded-3xl shadow-2xl text-center max-w-sm w-[90%] border-4 border-red-500 transform transition-transform scale-100">
            <h1 class="text-5xl text-red-500 mb-2 brand-font drop-shadow-md">Game Over!</h1>
            <p class="text-gray-700 text-xl font-bold mb-6">You ran out of hearts.</p>
            
            <div class="bg-yellow-100 rounded-xl p-4 mb-8 border-2 border-yellow-300">
                <p class="text-gray-600 font-bold uppercase tracking-wider text-sm">Final Score</p>
                <p id="finalScore" class="text-6xl text-yellow-600 brand-font">0</p>
            </div>

            <button onclick="resetGame()" class="btn-glow bg-blue-500 hover:bg-blue-600 text-white font-bold text-2xl py-4 px-8 rounded-full w-full transition-colors shadow-lg brand-font">
                Play Again!
            </button>
            <button onclick="goToMenu()" class="mt-4 text-gray-500 hover:text-gray-700 font-bold underline">
                Change Character
            </button>
        </div>
    </div>

    <!-- Game Logic -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const menuScreen = document.getElementById('menuScreen');
        const hud = document.getElementById('hud');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreDisplay = document.getElementById('finalScore');
        const questionBox = document.getElementById('questionBox');
        const mathQuestionDisplay = document.getElementById('mathQuestion');
        
        // Game Constants & Variables
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const GROUND_Y = 320;
        
        let frames = 0;
        let gameActive = false;
        let score = 0;
        let lives = 3;
        let baseSpeed = 5;
        let currentSpeed = baseSpeed;
        let animationId;
        
        let selectedCharacter = null;
        
        // Character Configs
        const characters = {
            'Murad': { emoji: '🏃‍♂️', color: '#3B82F6', jumpPower: -13 },
            'Sanan': { emoji: '🛹', color: '#10B981', jumpPower: -14 },
            'Leyla': { emoji: '🧚‍♀️', color: '#8B5CF6', jumpPower: -12 }
        };

        // Entities arrays
        let obstacles = [];
        let mathBubbles = [];
        let particles = [];
        let clouds = [];

        // Resize handling to keep aspect ratio
        function resizeCanvas() {
            const windowRatio = window.innerWidth / window.innerHeight;
            const gameRatio = GAME_WIDTH / GAME_HEIGHT;
            
            if (windowRatio < gameRatio) {
                canvas.style.width = window.innerWidth + 'px';
                canvas.style.height = (window.innerWidth / gameRatio) + 'px';
            } else {
                canvas.style.width = (window.innerHeight * gameRatio) + 'px';
                canvas.style.height = window.innerHeight + 'px';
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Audio Generation (Web Audio API - Synthesized sounds for zero dependencies)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'coin') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Player Class
        class Player {
            constructor(charName) {
                this.config = characters[charName];
                this.width = 50;
                this.height = 60;
                this.x = 100;
                this.y = GROUND_Y - this.height;
                this.vy = 0;
                this.gravity = 0.6;
                this.jumpPower = this.config.jumpPower;
                this.grounded = true;
                this.emoji = this.config.emoji;
                this.invincible = 0;
            }

            jump() {
                if (this.grounded) {
                    this.vy = this.jumpPower;
                    this.grounded = false;
                    playSound('jump');
                    
                    // Add jump dust particles
                    for(let i=0; i<5; i++) {
                        particles.push(new Particle(this.x + this.width/2, this.y + this.height, this.config.color));
                    }
                }
            }

            update() {
                this.vy += this.gravity;
                this.y += this.vy;

                if (this.y + this.height >= GROUND_Y) {
                    this.y = GROUND_Y - this.height;
                    this.vy = 0;
                    this.grounded = true;
                }

                if (this.invincible > 0) this.invincible--;
            }

            draw() {
                // Blink if invincible
                if (this.invincible > 0 && Math.floor(frames / 5) % 2 === 0) return;

                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Add a slight tilt when jumping
                if (!this.grounded) {
                    ctx.rotate(-0.1);
                }

                // Draw emoji
                ctx.font = '50px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(this.emoji, 0, 0);
                
                ctx.restore();
            }
        }

        // Obstacle Class (Glitches)
        class Obstacle {
            constructor() {
                this.width = 40;
                this.height = 40;
                this.x = GAME_WIDTH;
                this.y = GROUND_Y - this.height;
                this.emoji = ['👾', '🕷️', '🦇'][Math.floor(Math.random() * 3)];
                this.passed = false;
            }

            update() {
                this.x -= currentSpeed;
            }

            draw() {
                ctx.font = '40px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                
                // Bobbing animation
                const bob = Math.sin(frames * 0.1) * 5;
                ctx.fillText(this.emoji, this.x, this.y + bob);
            }
        }

        // Math Bubble Class (Educational Element)
        class MathBubble {
            constructor(x, y, value, isCorrect) {
                this.x = x;
                this.y = y;
                this.radius = 30;
                this.value = value;
                this.isCorrect = isCorrect;
                this.active = true;
                this.color = isCorrect ? '#3B82F6' : '#EF4444'; 
            }

            update() {
                this.x -= currentSpeed;
            }

            draw() {
                if (!this.active) return;
                
                const hover = Math.sin(frames * 0.05 + this.x) * 10;
                
                // Draw Bubble
                ctx.beginPath();
                ctx.arc(this.x, this.y + hover, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#FCD34D'; // Gold rim
                ctx.stroke();

                // Draw text
                ctx.fillStyle = '#1F2937';
                ctx.font = 'bold 24px Fredoka One, Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.value, this.x, this.y + hover);
            }
        }

        // Visual Particles
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 8 + 4;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.05;
            }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // Clouds for background
        class Cloud {
            constructor() {
                this.x = GAME_WIDTH + Math.random() * 200;
                this.y = Math.random() * 150 + 20;
                this.speed = Math.random() * 1 + 0.5;
                this.size = Math.random() * 30 + 30;
            }
            update() {
                this.x -= this.speed * (currentSpeed / baseSpeed);
                if (this.x + this.size * 3 < 0) {
                    this.x = GAME_WIDTH + 100;
                    this.y = Math.random() * 150 + 20;
                }
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.arc(this.x + this.size, this.y - this.size/2, this.size * 1.2, 0, Math.PI * 2);
                ctx.arc(this.x + this.size * 2, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let player;
        let activeQuestion = false;

        function selectCharacter(name) {
            selectedCharacter = name;
            startGame();
        }

        function generateMathQuestion() {
            const isAddition = Math.random() > 0.5;
            let a, b, answer;
            
            if (isAddition) {
                a = Math.floor(Math.random() * 10) + 1;
                b = Math.floor(Math.random() * 10) + 1;
                answer = a + b;
                mathQuestionDisplay.innerText = `${a} + ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * 10) + 5;
                b = Math.floor(Math.random() * a) + 1;
                answer = a - b;
                mathQuestionDisplay.innerText = `${a} - ${b} = ?`;
            }

            // Generate a wrong answer close to the real one
            let wrongAnswer = answer + (Math.random() > 0.5 ? 1 : -1) * (Math.floor(Math.random() * 3) + 1);
            if (wrongAnswer === answer) wrongAnswer += 1;
            if (wrongAnswer < 0) wrongAnswer = 0;

            // Randomize position (top/bottom)
            const topY = GROUND_Y - 120;
            const bottomY = GROUND_Y - 40;
            
            mathBubbles = [];
            if (Math.random() > 0.5) {
                mathBubbles.push(new MathBubble(GAME_WIDTH + 50, topY, answer, true));
                mathBubbles.push(new MathBubble(GAME_WIDTH + 50, bottomY, wrongAnswer, false));
            } else {
                mathBubbles.push(new MathBubble(GAME_WIDTH + 50, topY, wrongAnswer, false));
                mathBubbles.push(new MathBubble(GAME_WIDTH + 50, bottomY, answer, true));
            }

            // Show UI
            questionBox.classList.remove('scale-0', 'opacity-0');
            questionBox.classList.add('scale-100', 'opacity-100');
            activeQuestion = true;
        }

        function startGame() {
            if (!selectedCharacter) selectedCharacter = 'Murad';
            
            player = new Player(selectedCharacter);
            obstacles = [];
            mathBubbles = [];
            particles = [];
            clouds = [];
            for(let i=0; i<5; i++) clouds.push(new Cloud());
            
            score = 0;
            lives = 3;
            frames = 0;
            currentSpeed = baseSpeed;
            gameActive = true;
            activeQuestion = false;
            
            updateLivesDisplay();
            scoreDisplay.innerText = score;
            
            menuScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            questionBox.classList.add('scale-0', 'opacity-0');

            // Start Audio Context if needed
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (animationId) cancelAnimationFrame(animationId);
            gameLoop();
        }

        function loseLife() {
            lives--;
            updateLivesDisplay();
            playSound('hit');
            player.invincible = 60; // 1 second of invincibility
            
            // Screen shake effect
            canvas.style.transform = 'translate(10px, 10px)';
            setTimeout(() => canvas.style.transform = 'translate(-10px, -10px)', 50);
            setTimeout(() => canvas.style.transform = 'translate(10px, -10px)', 100);
            setTimeout(() => canvas.style.transform = 'translate(0, 0)', 150);

            if (lives <= 0) {
                endGame();
            }
        }

        function updateLivesDisplay() {
            document.getElementById('life1').style.opacity = lives >= 1 ? '1' : '0.2';
            document.getElementById('life2').style.opacity = lives >= 2 ? '1' : '0.2';
            document.getElementById('life3').style.opacity = lives >= 3 ? '1' : '0.2';
        }

        function endGame() {
            gameActive = false;
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScoreDisplay.innerText = score;
            questionBox.classList.add('scale-0', 'opacity-0');
        }

        function resetGame() {
            startGame();
        }

        function goToMenu() {
            gameOverScreen.classList.add('hidden');
            menuScreen.classList.remove('hidden');
            selectedCharacter = null;
        }

        // Input Handling
        function handleJump(e) {
            if (!gameActive) return;
            // Prevent default scrolling for touch/space
            if(e.type === 'touchstart' || (e.type === 'keydown' && (e.code === 'Space' || e.code === 'ArrowUp'))) {
                e.preventDefault(); 
                player.jump();
            } else if (e.type === 'mousedown') {
                player.jump();
            }
        }

        window.addEventListener('keydown', handleJump);
        window.addEventListener('mousedown', handleJump);
        window.addEventListener('touchstart', handleJump, {passive: false});

        function checkCollision(rect1, rect2) {
            // Rect1 is player, Rect2 is obstacle or bubble
            // Make player hitbox slightly smaller for forgiving gameplay
            const pX = rect1.x + 10;
            const pY = rect1.y + 10;
            const pW = rect1.width - 20;
            const pH = rect1.height - 10;

            if (rect2 instanceof MathBubble) {
                // Circle vs Rect approximation
                let distX = Math.abs(rect2.x - pX - pW/2);
                let distY = Math.abs(rect2.y - pY - pH/2);

                if (distX > (pW/2 + rect2.radius)) return false;
                if (distY > (pH/2 + rect2.radius)) return false;

                if (distX <= (pW/2)) return true; 
                if (distY <= (pH/2)) return true;

                let dx = distX - pW/2;
                let dy = distY - pH/2;
                return (dx*dx + dy*dy <= (rect2.radius*rect2.radius));
            } else {
                // AABB for obstacles
                return (
                    pX < rect2.x + rect2.width - 10 &&
                    pX + pW > rect2.x + 10 &&
                    pY < rect2.y + rect2.height - 10 &&
                    pY + pH > rect2.y + 10
                );
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw Background Elements (Sky, Clouds)
            clouds.forEach(cloud => {
                cloud.update();
                cloud.draw();
            });

            // Draw City Skyline Silhouette (Parallax)
            ctx.fillStyle = '#60A5FA';
            for(let i=0; i<10; i++) {
                let bx = ((i * 100) - (frames * 1) % 100);
                ctx.fillRect(bx, GROUND_Y - 40 - (i%3)*20, 80, 100);
            }

            // Draw Ground
            ctx.fillStyle = '#22C55E'; // Green grass
            ctx.fillRect(0, GROUND_Y, GAME_WIDTH, GAME_HEIGHT - GROUND_Y);
            ctx.fillStyle = '#166534'; // Dark dirt
            ctx.fillRect(0, GROUND_Y + 15, GAME_WIDTH, GAME_HEIGHT - GROUND_Y - 15);
            
            // Ground stripes for speed illusion
            ctx.fillStyle = '#15803D';
            for(let i=0; i<20; i++) {
                let sx = ((i * 50) - (frames * currentSpeed) % 50);
                ctx.fillRect(sx, GROUND_Y + 15, 20, GAME_HEIGHT);
            }

            // Spawning Logic
            if (frames % 120 === 0 && !activeQuestion) {
                // Every ~2 seconds, decide to spawn obstacle or question
                if (Math.random() < 0.3) {
                    generateMathQuestion();
                } else {
                    obstacles.push(new Obstacle());
                }
            }

            // Update & Draw Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.update();
                obs.draw();

                // Collision
                if (player.invincible === 0 && checkCollision(player, obs)) {
                    loseLife();
                    obstacles.splice(i, 1); // remove hit obstacle
                } else if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score += 10;
                    scoreDisplay.innerText = score;
                }
            }

            // Update & Draw Math Bubbles
            for (let i = mathBubbles.length - 1; i >= 0; i--) {
                let bubble = mathBubbles[i];
                bubble.update();
                bubble.draw();

                if (bubble.active && checkCollision(player, bubble)) {
                    bubble.active = false;
                    if (bubble.isCorrect) {
                        playSound('coin');
                        score += 50;
                        scoreDisplay.innerText = score;
                        // Particle explosion
                        for(let p=0; p<20; p++) {
                            particles.push(new Particle(bubble.x, bubble.y, '#FBBF24'));
                        }
                    } else {
                        if (player.invincible === 0) loseLife();
                    }
                    
                    // Clear both bubbles and question UI
                    mathBubbles = [];
                    activeQuestion = false;
                    questionBox.classList.remove('scale-100', 'opacity-100');
                    questionBox.classList.add('scale-0', 'opacity-0');
                    break;
                } else if (bubble.x + bubble.radius < 0) {
                    mathBubbles.splice(i, 1);
                    if(mathBubbles.length === 0) {
                        activeQuestion = false;
                        questionBox.classList.remove('scale-100', 'opacity-100');
                        questionBox.classList.add('scale-0', 'opacity-0');
                    }
                }
            }

            // Update & Draw Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Player Update & Draw
            player.update();
            player.draw();

            // Increase Difficulty smoothly over time
            frames++;
            if (frames % 600 === 0) { // Every ~10 seconds
                currentSpeed += 0.5;
                score += 20; // Survival bonus
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // Draw initial static background for the menu
        ctx.fillStyle = '#93C5FD'; // Light blue sky
